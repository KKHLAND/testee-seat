<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>시험 감독 지원 도우미</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- 세련된 폰트 (Pretendard) 적용 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
      body, .font-sans {
          font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', sans-serif;
      }

      /* 스크롤바 디자인 (Select Box용) */
      select[multiple]::-webkit-scrollbar {
          width: 8px;
      }
      select[multiple]::-webkit-scrollbar-track {
          background: #f1f5f9;
          border-radius: 4px;
      }
      select[multiple]::-webkit-scrollbar-thumb {
          background: #cbd5e1;
          border-radius: 4px;
      }
      select[multiple]::-webkit-scrollbar-thumb:hover {
          background: #94a3b8;
      }

      /* ================= 인쇄용 스타일 (기존 기능 유지 및 빈 페이지 방지 수정) ================= */
      @page {
        size: A4 portrait;
        margin: 1.2cm;
      }

      @media print {
        html, body {
          height: auto !important;
          min-height: 0 !important;
          margin: 0;
          padding: 0;
          background-color: white;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }

        .print-hidden {
            display: none !important;
        }

        #printable-area {
          margin: 0;
          padding: 0;
          width: 100%;
          display: block;
        }
        
        .printable-unit {
          page-break-inside: avoid !important;
        }
        
        .seating-chart-wrapper {
           page-break-before: always !important; 
        }

        /* 각 과목별 인쇄 블록 다음에 페이지를 나누되, 마지막 블록 다음에는 나누지 않음 (최신 규격 적용) */
        .subject-print-block:not(:last-child) {
            page-break-after: always !important;
            break-after: page !important;
        }

        .printable-container {
            border: 1px solid #aaa !important;
        }
        
        #attendance-sheet-area { font-size: 9.2pt !important; }
        #attendance-sheet-area h1 { font-size: 21pt !important; }
        #attendance-sheet-area table { font-size: 8.5pt !important; line-height: 1.2; }
        #attendance-sheet-area .p-8 { padding: 1.1rem !important; }

        #seating-chart-area { font-size: 9pt !important; }
        #seating-chart-area .h-40 { height: 6.5rem !important; } 
        #seating-chart-area .p-8 { padding: 1rem !important; }
        #seating-chart-area .my-8 { margin-top: 1rem !important; margin-bottom: 1rem !important; }
        
        .printable-container .text-5xl { font-size: 21pt !important; }
        .printable-container .text-3xl { font-size: 14.5pt !important; }
        .printable-container .text-2xl { font-size: 12.5pt !important; }
        .printable-container .text-xl { font-size: 11.5pt !important; }
        .printable-container .p-3 { padding: 0.35rem !important; }
        .printable-container .p-2 { padding: 0.2rem 0.25rem !important; }

        .print-logo-position {
            top: 0.5rem !important;
            right: 0.8rem !important;
            width: 5.5rem !important;
            height: 5.5rem !important;
        }

        .printing-attendance .seating-chart-wrapper { display: none !important; }
        .printing-seating-chart .attendance-sheet-wrapper { display: none !important; }
        .printing-seating-chart .seating-chart-wrapper { page-break-before: avoid !important; }
        .printing-seating-chart .subject-print-block + .subject-print-block .seating-chart-wrapper { page-break-before: always !important; }
      }
    </style>
</head>
<body class="bg-[#F4F6F9] font-sans antialiased text-slate-800 min-h-screen print:min-h-0 print:bg-white print:block flex flex-col">
    <div id="root" class="flex-grow flex flex-col print:block">
        <!-- 헤더 영역 (이미지 기반 블루 그라데이션 적용) -->
        <header class="bg-gradient-to-r from-[#0a1835] via-[#0a488c] to-[#008fc7] pt-16 pb-24 px-4 shadow-lg print-hidden relative overflow-hidden">
            <div class="max-w-7xl mx-auto text-center relative z-10">
                <!-- 뱃지 -->
                <div class="inline-flex items-center justify-center space-x-2 bg-white/10 rounded-full px-5 py-1.5 mb-6 border border-white/10 backdrop-blur-md shadow-inner">
                    <span class="flex h-2.5 w-2.5 relative mr-1">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-yellow-500"></span>
                    </span>
                    <span class="text-white text-sm font-semibold tracking-wide">Exam Support Assistant</span>
                    <span class="text-yellow-400 text-xs font-bold ml-2 px-2 border-l border-white/30">SMART SYSTEM</span>
                </div>
                <h1 class="text-4xl sm:text-5xl font-extrabold text-white mb-5 tracking-tight drop-shadow-sm">시험 현황 자동화 시스템</h1>
                <p class="text-blue-100 text-lg max-w-2xl mx-auto font-medium">업로드된 시간표 데이터를 분석하여 최적화된 응시현황표와 자리배치표를 빠르고 정확하게 생성합니다.</p>
            </div>
            <!-- 배경 장식용 빛번짐 효과 -->
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[300px] bg-cyan-400/20 blur-[100px] rounded-full pointer-events-none"></div>
            <div class="absolute -bottom-24 left-0 w-64 h-64 bg-blue-500/20 blur-[80px] rounded-full pointer-events-none"></div>
        </header>

        <!-- [수정] print:mt-0 및 print:pb-0 추가 : 인쇄 시 하단 여백 때문에 빈 페이지 생기는 현상 방지 -->
        <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-8 -mt-16 print:mt-0 relative z-20 pb-16 print:pb-0 print:mb-0">
            <!-- 파일 업로드 섹션 -->
            <div id="upload-section" class="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.06)] p-8 sm:p-10 mb-8 print-hidden border border-slate-100 overflow-hidden relative">
                <!-- 상단 장식 바 -->
                <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-blue-400 to-indigo-500"></div>
                
                <div class="mb-6 flex items-center">
                    <div class="bg-blue-50 p-2 rounded-lg mr-3 text-blue-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                    </div>
                    <h2 class="text-xl font-bold text-slate-800">데이터 소스 업로드</h2>
                </div>

                <label for="csv-upload" class="w-full group">
                    <div class="flex flex-col items-center justify-center w-full h-56 border-2 border-slate-200 border-dashed rounded-2xl cursor-pointer bg-[#f8fafc] group-hover:bg-[#f1f5f9] group-hover:border-blue-400 group-hover:shadow-inner transition-all duration-300 relative overflow-hidden">
                        <div class="bg-white shadow-sm p-4 rounded-full mb-4 group-hover:scale-110 group-hover:text-blue-600 group-hover:shadow-md transition-all duration-300 text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
                        </div>
                        <p class="mb-2 text-lg text-slate-600 font-medium"><span class="font-bold text-blue-600">클릭하여 파일 업로드</span> 또는 이 영역에 드래그</p>
                        <p class="text-sm text-slate-400 font-medium bg-white/60 px-3 py-1 rounded-full border border-slate-100">지원 확장자: CSV (UTF-8), Excel (.xlsx, .xls)</p>
                    </div>
                </label>
                <input id="csv-upload" type="file" class="hidden" accept=".csv,.xlsx,.xls" />
                <p id="loading-message" class="text-center text-blue-600 mt-6 font-bold flex items-center justify-center hidden">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    파일을 분석하고 있습니다...
                </p>
                <p id="error-message" class="text-center text-red-600 mt-6 bg-red-50 border border-red-200 p-4 rounded-xl font-medium hidden flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    <span></span>
                </p>
            </div>

            <!-- 컨트롤 섹션 (설정 영역) -->
            <div id="controls-section" class="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.06)] p-8 sm:p-10 mb-8 print-hidden border border-slate-100 relative overflow-hidden hidden">
                <!-- 상단 장식 바 -->
                <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-teal-400 to-emerald-500"></div>

                <div class="mb-8 flex items-center border-b border-slate-100 pb-4">
                    <div class="bg-teal-50 p-2 rounded-lg mr-3 text-teal-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-slate-800">시험 정보 및 생성 옵션 설정</h2>
                        <p class="text-sm text-slate-500 mt-1">추출할 조건과 출력 옵션을 선택하세요.</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-6 mb-8">
                    <!-- 입력 폼 그룹 (공통 스타일 클래스 적용) -->
                    <style>
                        .input-style {
                            @apply w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 font-medium focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all outline-none shadow-sm;
                        }
                        .label-style {
                            @apply block text-sm font-bold text-slate-700 mb-2 flex items-center;
                        }
                        .label-dot {
                            @apply w-1.5 h-1.5 rounded-full mr-2 opacity-80;
                        }
                    </style>

                    <div class="flex flex-col">
                        <label for="school-year" class="label-style"><span class="label-dot bg-blue-500"></span>학년도</label>
                        <input id="school-year" type="number" class="input-style" />
                    </div>
                    <div class="flex flex-col">
                        <label for="semester" class="label-style"><span class="label-dot bg-indigo-500"></span>학기</label>
                        <select id="semester" class="input-style cursor-pointer">
                            <option value="1">1학기</option>
                            <option value="2">2학기</option>
                        </select>
                    </div>
                    <div class="flex flex-col">
                        <label for="exam-type" class="label-style"><span class="label-dot bg-purple-500"></span>고사명</label>
                        <select id="exam-type" class="input-style cursor-pointer">
                            <option value="중간고사">중간고사</option>
                            <option value="기말고사">기말고사</option>
                        </select>
                    </div>
                    <div class="flex flex-col">
                        <label for="exam-date" class="label-style"><span class="label-dot bg-teal-500"></span>고사일</label>
                        <select id="exam-date" class="input-style cursor-pointer"></select>
                    </div>
                    <div class="flex flex-col">
                        <label for="exam-period" class="label-style"><span class="label-dot bg-emerald-500"></span>교시</label>
                        <select id="exam-period" class="input-style cursor-pointer disabled:opacity-50 disabled:bg-slate-100" disabled>
                            <option value="">날짜를 선택하세요</option>
                        </select>
                    </div>
                    <div class="flex flex-col lg:col-span-1 lg:row-span-2 relative">
                        <label for="exam-subject" class="label-style"><span class="label-dot bg-rose-500"></span>과목명 <span class="text-xs text-slate-400 font-normal ml-1">(다중: Ctrl/Shift)</span></label>
                        <select id="exam-subject" multiple size="5" class="input-style min-h-[140px] lg:h-full py-2 disabled:opacity-50 disabled:bg-slate-100" disabled>
                            <option>교시를 선택하세요</option>
                        </select>
                    </div>
                </div>

                <!-- 하단 액션 버튼 영역 -->
                <div class="mt-10 bg-slate-50 p-6 rounded-2xl border border-slate-100 flex flex-col lg:flex-row justify-between items-center gap-6">
                    <div class="flex flex-wrap items-center justify-center gap-4 w-full lg:w-auto">
                        <button id="generate-btn" disabled class="bg-gradient-to-r from-blue-600 to-blue-500 text-white font-bold py-3.5 px-8 rounded-full hover:shadow-lg hover:-translate-y-0.5 transition-all focus:outline-none focus:ring-4 focus:ring-blue-500/30 disabled:opacity-50 disabled:grayscale disabled:cursor-not-allowed disabled:transform-none disabled:shadow-none flex items-center justify-center min-w-[160px]">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                            문서 생성하기
                        </button>
                        
                        <!-- 로고 컨트롤 영역 -->
                        <div id="logo-controls" class="flex items-center">
                            <label for="logo-upload" class="bg-white border border-slate-300 text-slate-700 font-bold py-3.5 px-6 rounded-full hover:bg-slate-50 hover:text-blue-600 hover:border-blue-300 transition-all cursor-pointer shadow-sm flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                                학교 로고 삽입
                            </label>
                        </div>
                        <input id="logo-upload" type="file" class="hidden" accept="image/*" />
                    </div>

                    <div id="print-controls" class="hidden flex flex-wrap items-center justify-center gap-3 w-full lg:w-auto">
                        <div class="h-8 w-px bg-slate-300 hidden lg:block mx-2"></div>
                        <button id="print-attendance-btn" class="bg-gradient-to-r from-orange-500 to-[#f97316] text-white font-bold py-3.5 px-6 rounded-full hover:shadow-lg hover:shadow-orange-500/30 hover:-translate-y-0.5 transition-all focus:outline-none focus:ring-4 focus:ring-orange-500/30 flex items-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" /><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h.01a1 1 0 100-2H10zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h.01a1 1 0 100-2H10z" clip-rule="evenodd" /></svg>
                            응시현황표 인쇄
                        </button>
                        <button id="print-seating-chart-btn" class="bg-gradient-to-r from-sky-500 to-[#0ea5e9] text-white font-bold py-3.5 px-6 rounded-full hover:shadow-lg hover:shadow-sky-500/30 hover:-translate-y-0.5 transition-all focus:outline-none focus:ring-4 focus:ring-sky-500/30 flex items-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zM6 8a2 2 0 11-4 0 2 2 0 014 0zM1.49 15.326a.78.78 0 01-.358-.442 3 3 0 014.308-3.516 6.484 6.484 0 00-1.905 3.959c-.023.222-.014.442.028.658a.78.78 0 01-.357.502A2.74 2.74 0 011.49 15.326zM16 8a2 2 0 11-4 0 2 2 0 014 0zM10 14a6.5 6.5 0 00-6.225 4.43a.78.78 0 01-.357.502A2.74 2.74 0 011.49 19c2.023 0 3.83-.934 5.034-2.435A6.5 6.5 0 0010 14zm9.51 1.326a.78.78 0 01-.358-.442 3 3 0 014.308-3.516 6.484 6.484 0 00-1.905 3.959c-.023.222-.014.442.028.658a.78.78 0 01-.357.502A2.74 2.74 0 0119.51 15.326z" /></svg>
                            자리배치표 인쇄
                        </button>
                    </div>
                </div>
            </div>

            <!-- 결과물이 출력되는 영역 (print:pb-0 및 print:mb-0 추가) -->
            <div id="printable-area" class="pb-10 print:pb-0 print:mb-0"></div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let allStudents = [];
            let schoolLogo = null;
            const csvUpload = document.getElementById('csv-upload');
            const loadingMessage = document.getElementById('loading-message');
            const errorMessage = document.getElementById('error-message');
            const errorTextSpan = errorMessage.querySelector('span'); // 에러 메시지 텍스트용 span
            const controlsSection = document.getElementById('controls-section');
            const printableArea = document.getElementById('printable-area');
            const schoolYearInput = document.getElementById('school-year');
            const semesterSelect = document.getElementById('semester');
            const examTypeSelect = document.getElementById('exam-type');
            const dateSelect = document.getElementById('exam-date');
            const periodSelect = document.getElementById('exam-period');
            const subjectSelect = document.getElementById('exam-subject');
            const generateBtn = document.getElementById('generate-btn');
            const logoUpload = document.getElementById('logo-upload');
            const logoControls = document.getElementById('logo-controls');
            const printControls = document.getElementById('print-controls');
            const printAttendanceBtn = document.getElementById('print-attendance-btn');
            const printSeatingChartBtn = document.getElementById('print-seating-chart-btn');
            schoolYearInput.value = new Date().getFullYear().toString();
            
            const parseCsv = (csvText) => {
                const processedText = csvText.startsWith('\uFEFF') ? csvText.substring(1) : csvText;
                const rows = processedText.trim().split(/\r?\n/);
                rows.shift();
                return rows.map((row, rowIndex) => {
                    if (!row.trim()) return null;
                    const valuesRaw = row.trim().split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);
                    const values = valuesRaw.map(v => { let value = v.trim(); if (value.startsWith('"') && value.endsWith('"')) { return value.substring(1, value.length - 1).replace(/""/g, '"'); } return value; });
                    if (values.length < 9) return null;
                    try {
                        const studentId = values[1]?.trim(); const name = values[2]?.trim(); const date = values[3]?.trim(); const period = values[4]?.trim(); const subjectBase = values[5]?.trim(); const subjectModifier = values[6]?.trim(); const room = values[7]?.trim(); const proctor = values[8]?.trim();
                        if (!studentId || !name || !date || !period || !subjectBase || !subjectModifier || !room || !proctor) return null;
                        if (studentId.length !== 5 || !/^\d+$/.test(studentId)) return null;
                        const grade = parseInt(studentId[0], 10); const studentClass = parseInt(studentId.substring(1, 3), 10); const number = parseInt(studentId.substring(3, 5), 10);
                        if (isNaN(grade) || isNaN(studentClass) || isNaN(number)) return null;
                        return { studentId, name, date, period, subject: `${subjectBase} ${subjectModifier}`, grade, class: studentClass, number, room, proctor };
                    } catch (e) { return null; }
                }).filter(student => student !== null);
            };

            const parseExcel = (arrayBuffer) => {
                try {
                    const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                    if (!rows || rows.length < 2) throw new Error('Excel 파일에 데이터가 없습니다.');
                    
                    return rows.slice(1).map((row, rowIndex) => {
                        if (!row || row.length < 9) return null;
                        try {
                            const studentId = String(row[1] || '').trim();
                            const name = String(row[2] || '').trim();
                            let date = String(row[3] || '').trim();
                            const period = String(row[4] || '').trim();
                            const subjectBase = String(row[5] || '').trim();
                            const subjectModifier = String(row[6] || '').trim();
                            const room = String(row[7] || '').trim();
                            const proctor = String(row[8] || '').trim();
                            
                            if (!studentId || !name || !date || !period || !subjectBase || !subjectModifier || !room || !proctor) return null;
                            if (studentId.length !== 5 || !/^\d+$/.test(studentId)) return null;
                            
                            const grade = parseInt(studentId[0], 10);
                            const studentClass = parseInt(studentId.substring(1, 3), 10);
                            const number = parseInt(studentId.substring(3, 5), 10);
                            if (isNaN(grade) || isNaN(studentClass) || isNaN(number)) return null;
                            
                            return { studentId, name, date, period: String(period), subject: `${subjectBase} ${subjectModifier}`, grade, class: studentClass, number, room, proctor };
                        } catch (e) { return null; }
                    }).filter(student => student !== null);
                } catch (err) {
                    throw new Error('Excel 파일을 처리하는 중 오류가 발생했습니다: ' + err.message);
                }
            };

            const showError = (message) => { errorTextSpan.textContent = message; errorMessage.classList.remove('hidden'); };
            const hideError = () => { errorMessage.classList.add('hidden'); };
            const resetUI = () => { controlsSection.classList.add('hidden'); printableArea.innerHTML = ''; printControls.classList.add('hidden'); hideError(); };
            
            const updateDateOptions = () => {
                const dates = [...new Set(allStudents.map(s => s.date))].sort();
                dateSelect.innerHTML = dates.map(date => `<option value="${date}">${date}</option>`).join('');
                if (dates.length > 0) { dateSelect.value = dates[0]; }
                updatePeriodOptions();
            };
            
            const updatePeriodOptions = () => {
                const selectedDate = dateSelect.value;
                if (!selectedDate) { periodSelect.innerHTML = '<option value="">날짜를 선택하세요</option>'; periodSelect.disabled = true; return; }
                const relevantPeriods = [...new Set(allStudents.filter(s => s.date === selectedDate).map(s => s.period))].sort((a, b) => parseInt(a, 10) - parseInt(b, 10));
                periodSelect.innerHTML = relevantPeriods.map(p => `<option value="${p}">${p}교시</option>`).join('');
                periodSelect.disabled = false;
                if(relevantPeriods.length > 0) { periodSelect.value = relevantPeriods[0]; }
                updateSubjectOptions();
            };
            
            const updateSubjectOptions = () => {
                const selectedDate = dateSelect.value; const selectedPeriod = periodSelect.value;
                if (!selectedPeriod) { subjectSelect.innerHTML = '<option>교시를 선택하세요</option>'; subjectSelect.disabled = true; return; }
                const relevantSubjects = [...new Set(allStudents.filter(s => s.date === selectedDate && s.period === selectedPeriod).map(s => s.subject))].sort();
                subjectSelect.innerHTML = relevantSubjects.map(s => `<option value="${s}" class="p-1.5 hover:bg-blue-50 border-b border-slate-50 last:border-0 rounded">${s}</option>`).join('');
                subjectSelect.disabled = false;
            };
            
            const resetGeneratedOutput = () => { printableArea.innerHTML = ''; printControls.classList.add('hidden'); };
            
            csvUpload.addEventListener('change', (event) => {
                const file = event.target.files?.[0]; 
                if (!file) return; 
                resetUI(); 
                loadingMessage.classList.remove('hidden');
                
                const fileName = file.name.toLowerCase();
                const reader = new FileReader();
                reader.onload = (e) => {
                    setTimeout(() => { // UI 업데이트를 위한 짧은 지연 (loading 애니메이션 보여주기 위함)
                        try {
                            let students = [];
                            if (fileName.endsWith('.csv')) { students = parseCsv(e.target?.result); } 
                            else if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) { students = parseExcel(e.target?.result); } 
                            else { throw new Error('지원하지 않는 파일 형식입니다. CSV 또는 Excel 파일을 업로드하세요.'); }
                            
                            if (students.length === 0) throw new Error("파일에서 유효한 학생 데이터를 찾을 수 없습니다.");
                            allStudents = students; 
                            controlsSection.classList.remove('hidden'); 
                            updateDateOptions();
                        } catch (err) { 
                            showError(err.message || '파일을 처리하는 중 오류가 발생했습니다.'); 
                        } finally { 
                            loadingMessage.classList.add('hidden'); 
                        }
                    }, 500);
                };
                reader.onerror = () => { showError('파일을 읽는 중 오류가 발생했습니다.'); loadingMessage.classList.add('hidden'); }
                
                if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) { reader.readAsArrayBuffer(file); } 
                else { reader.readAsText(file, 'UTF-8'); }
            });
            
            dateSelect.addEventListener('change', updatePeriodOptions);
            periodSelect.addEventListener('change', updateSubjectOptions);
            [schoolYearInput, semesterSelect, examTypeSelect, dateSelect, periodSelect, subjectSelect].forEach(el => { el.addEventListener('change', resetGeneratedOutput); });
            subjectSelect.addEventListener('change', () => { const selectedOptions = Array.from(subjectSelect.selectedOptions); generateBtn.disabled = selectedOptions.length === 0; });
            
            logoUpload.addEventListener('change', (event) => {
                const file = event.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => { schoolLogo = reader.result; updateLogoControls(); if (printableArea.innerHTML) generateContent(); };
                    reader.readAsDataURL(file);
                }
            });
            
            generateBtn.addEventListener('click', () => { 
                const selectedSubjects = Array.from(subjectSelect.selectedOptions).map(opt => opt.value); 
                if (selectedSubjects.length === 0) { showError("하나 이상의 과목을 선택해야 합니다."); return; } 
                hideError(); 
                generateContent(); 
                // 부드러운 스크롤 이동
                setTimeout(() => { document.getElementById('printable-area').scrollIntoView({ behavior: 'smooth' }); }, 100);
            });
            
            printAttendanceBtn.addEventListener('click', () => { document.body.classList.add('printing-attendance'); window.print(); });
            printSeatingChartBtn.addEventListener('click', () => { document.body.classList.add('printing-seating-chart'); window.print(); });
            window.addEventListener('afterprint', () => { document.body.classList.remove('printing-attendance', 'printing-seating-chart'); });

            const updateLogoControls = () => {
                 if (!schoolLogo) { 
                     logoControls.innerHTML = `<label for="logo-upload" class="bg-white border border-slate-300 text-slate-700 font-bold py-3.5 px-6 rounded-full hover:bg-slate-50 hover:text-blue-600 hover:border-blue-300 transition-all cursor-pointer shadow-sm flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>학교 로고 삽입</label>`; 
                 } else {
                     logoControls.innerHTML = `<div class="flex items-center gap-3 p-1.5 border border-slate-200 rounded-full bg-white shadow-sm pr-2 pl-2"><img src="${schoolLogo}" alt="School logo preview" class="h-10 w-10 object-contain border border-slate-100 rounded-full bg-slate-50" /><label for="logo-upload" class="text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2 px-4 rounded-full cursor-pointer transition-colors">변경</label><button id="remove-logo-btn" class="text-sm bg-red-50 hover:bg-red-100 text-red-600 font-bold py-2 px-4 rounded-full transition-colors border border-red-100">삭제</button></div>`;
                     document.getElementById('remove-logo-btn').addEventListener('click', () => { schoolLogo = null; updateLogoControls(); if (printableArea.innerHTML) generateContent(); });
                 }
            };

            const generateContent = () => {
                const selectedDate = dateSelect.value; const selectedPeriod = periodSelect.value; const selectedSubjects = Array.from(subjectSelect.selectedOptions).map(opt => opt.value); const schoolYear = schoolYearInput.value; const semesterText = semesterSelect.options[semesterSelect.selectedIndex].text;
                const selectedExamType = examTypeSelect.value;
                const outputData = selectedSubjects.map(subject => {
                    const filtered = allStudents.filter(s => s.date === selectedDate && s.period === selectedPeriod && s.subject === subject).sort((a, b) => a.class - b.class || a.number - b.number);
                    const { room, proctor } = filtered[0] || { room: 'N/A', proctor: 'N/A' };
                    return { students: filtered, examDate: selectedDate, period: selectedPeriod, subject, proctor, room, logo: schoolLogo, schoolYear, semester: semesterText, examType: selectedExamType };
                });
                printableArea.innerHTML = outputData.map(props => generatePrintLayout(props)).join('');
                printControls.classList.remove('hidden');
            };

            const generatePrintLayout = (props) => {
                return `
                    <div class="subject-print-block print:shadow-none shadow-[0_8px_30px_rgb(0,0,0,0.06)] rounded-xl overflow-hidden print:overflow-visible print:border-0 print:mb-0 mb-8 border border-slate-200 bg-white">
                        <div class="printable-unit attendance-sheet-wrapper">
                            ${generateAttendanceSheet(props)}
                        </div>
                        <div class="printable-unit seating-chart-wrapper border-t-[16px] border-slate-100 print:border-0">
                            ${generateSeatingChart(props)}
                        </div>
                    </div>
                `;
            };

            const generateAttendanceSheet = ({ students, examDate, period, subject, room, logo, schoolYear, semester, examType }) => {
                const studentRows = Array.from({ length: 31 }).map((_, index) => {
                    const student = students[index];
                    return `<tr><td class="border border-slate-800 p-2 print:py-1 print:px-1">${index + 1}</td><td class="border border-slate-800 p-2 print:py-1 print:px-1">${student?.grade ?? ''}</td><td class="border border-slate-800 p-2 print:py-1 print:px-1">${student?.class ?? ''}</td><td class="border border-slate-800 p-2 print:py-1 print:px-1">${student?.number ?? ''}</td><td class="border border-slate-800 p-2 bg-yellow-50 print:py-1 print:px-1 font-semibold">${student?.studentId ?? ''}</td><td class="border border-slate-800 p-2 bg-yellow-50 print:py-1 print:px-1 font-semibold">${student?.name ?? ''}</td><td class="border border-slate-800 p-2 print:py-1 print:px-1"></td><td class="border border-slate-800 p-2 print:py-1 print:px-1"></td></tr>`;
                }).join('');
                const logoDiv = logo ? `<div style="background-image: url(${logo});" class="bg-contain bg-center bg-no-repeat absolute print-logo-position" aria-label="School Logo" role="img"></div>` : '';
                return `<div id="attendance-sheet-area" class="bg-white p-8 border-0 font-['Malgun_Gothic'] printable-container relative print:p-4"><h1 class="text-center text-5xl font-extrabold mb-4 print:text-3xl print:mb-2 text-slate-800 tracking-tight">&lt;응시현황표&gt;</h1>${logoDiv}<div class="text-base mb-4 text-center print:text-xs print:mb-2 text-slate-600 font-medium">OMR 카드 회수시 &lt;응시현황표&gt; OMR카드 봉투에 동봉</div><div class="border-2 border-slate-800"><div class="grid grid-cols-10"><div class="col-span-10 text-center font-bold text-3xl p-3 bg-blue-800 text-white border-b border-blue-800 print:text-xl print:py-1 print:px-1 tracking-wide">${schoolYear}학년도 ${semester} ${examType}</div><div class="col-span-2 text-center p-3 font-bold bg-slate-100 border-r border-slate-800 text-xl print:text-base print:py-1 print:px-1">고사일</div><div class="col-span-3 text-center p-3 border-r border-slate-800 text-2xl print:text-lg print:py-1 print:px-1 font-semibold">${examDate}</div><div class="col-span-2 text-center p-3 font-bold bg-slate-100 border-r border-slate-800 text-xl print:text-base print:py-1 print:px-1">교시</div><div class="col-span-3 text-center p-3 text-2xl print:text-lg print:py-1 print:px-1 font-semibold">${period}교시</div></div><div class="grid grid-cols-10 border-t border-slate-800"><div class="col-span-2 text-center p-3 font-bold bg-slate-100 border-r border-slate-800 text-xl print:text-base print:py-1 print:px-1">과목명</div><div class="col-span-8 text-center p-3 text-2xl print:text-lg print:py-1 print:px-1 font-bold text-blue-800">${subject}</div></div><div class="grid grid-cols-10 border-t border-slate-800"><div class="col-span-2 text-center p-3 font-bold bg-slate-100 border-r border-slate-800 text-xl print:text-base print:py-1 print:px-1">시험장소</div><div class="col-span-3 text-center p-3 border-r border-slate-800 text-2xl print:text-lg print:py-1 print:px-1 font-bold text-rose-700">${room}</div><div class="col-span-2 text-center p-3 font-bold bg-slate-100 border-r border-slate-800 text-xl print:text-base print:py-1 print:px-1">응시인원</div><div class="col-span-3 text-center p-3 text-2xl print:text-lg print:py-1 print:px-1 font-semibold">${students.length} 명</div></div></div><div class="text-base mt-2 print:text-[10px] print:mt-2 text-slate-600 font-medium">※ 출결 : 결석○, 지각ø (*위탁생 결번 처리)<br />※ 입실시간 : 지각생 입실시간 기록</div><div class="mt-4 print:mt-2"><table class="w-full border-collapse border-2 border-slate-800 text-center text-lg print:text-xs print:leading-tight"><thead class="bg-slate-100 font-bold text-slate-700"><tr><th class="border border-slate-800 p-2 print:py-1 print:px-1">순번</th><th class="border border-slate-800 p-2 print:py-1 print:px-1">학년</th><th class="border border-slate-800 p-2 print:py-1 print:px-1">반</th><th class="border border-slate-800 p-2 print:py-1 print:px-1">번호</th><th class="border border-slate-800 p-2 print:py-1 print:px-1">학번</th><th class="border border-slate-800 p-2 print:py-1 print:px-1">이름</th><th class="border border-slate-800 p-2 print:py-1 print:px-1">출결</th><th class="border border-slate-800 p-2 print:py-1 print:px-1">입실시간</th></tr></thead><tbody>${studentRows}</tbody></table></div></div>`;
            };

            const generateSeatingChart = ({ students, subject, room, proctor, logo }) => {
                const numStudents = students.length; 
                const numCols = 5; 
                
                let numRows = numStudents > 0 ? Math.ceil(numStudents / numCols) : 0; 
                const isSpecial31 = numStudents === 31;
                if (isSpecial31) {
                    numRows = 7;
                }

                const totalSeats = numRows * numCols;
                const seats = Array.from({ length: totalSeats }).map((_, index) => {
                    const rowIndex = Math.floor(index / numCols); 
                    const colIndex = index % numCols; 
                    
                    let studentIndex;
                    if (isSpecial31) {
                        if (rowIndex < 6) {
                            studentIndex = colIndex * 6 + rowIndex;
                        } else {
                            // 7번째 줄(rowIndex 6), 오른쪽에서 두 번째 줄(colIndex 3)에 31번 학생 배치
                            studentIndex = (colIndex === 3) ? 30 : -1;
                        }
                    } else {
                        studentIndex = colIndex * numRows + rowIndex;
                    }

                    const student = (studentIndex >= 0 && studentIndex < numStudents) ? students[studentIndex] : undefined; 
                    const seatNumber = studentIndex + 1;

                    // 31명 특수 레이아웃에서 7번째 줄의 빈칸은 투명 공간으로 처리
                    if (isSpecial31 && rowIndex === 6 && colIndex !== 3) {
                        return `<div class="relative p-2 h-40 print:h-32"></div>`;
                    }

                    return `<div class="relative border-2 border-slate-200 rounded-xl p-2 h-40 flex flex-col justify-center items-center bg-slate-50 shadow-sm print:h-32 print:p-1 print:shadow-none print:rounded-lg"><div class="absolute top-1.5 left-2.5 font-bold text-slate-400 text-lg print:text-sm">${seatNumber}</div>${student ? `<div class="text-center w-full"><div class="text-xl text-blue-600 font-semibold mb-1 print:text-base">${student.studentId}</div><div class="font-extrabold text-2xl text-slate-800 tracking-wide print:text-lg bg-white rounded-md py-1 mx-1 shadow-sm border border-slate-100 print:shadow-none print:p-0">${student.name}</div></div>` : `<div aria-hidden="true">&nbsp;</div>`}</div>`;
                }).join('');
                const logoDiv = logo ? `<div style="background-image: url(${logo});" class="bg-contain bg-center bg-no-repeat absolute print-logo-position" aria-label="School Logo" role="img"></div>` : '';
                return `<div id="seating-chart-area" class="bg-white p-8 border-0 font-['Malgun_Gothic'] printable-container relative print:p-4">${logoDiv}<div class="mb-8 print:mb-4"><div class="flex justify-between items-start"><div class="border-2 border-rose-500 rounded-lg p-3 text-rose-600 font-extrabold text-3xl print:text-2xl print:p-2 print:rounded-none shadow-sm print:shadow-none bg-rose-50">${subject}</div><div class="text-center flex-grow"><h1 class="text-5xl font-extrabold mb-2 print:text-4xl print:mb-1 text-slate-800 tracking-tight">&lt;자리배치표&gt;</h1></div><div class="w-40 print:w-28"></div></div><div class="text-2xl text-center space-y-1.5 mt-4 pt-4 border-t border-slate-200 print:border-t-0 print:text-xl print:mt-1 print:pt-1 font-medium text-slate-700"><div class="inline-block mr-6"><span class="text-slate-400 mr-2">과목명</span><span class="font-bold">${subject}</span></div><div class="inline-block mr-6"><span class="text-slate-400 mr-2">고사실</span><span class="font-bold text-rose-600">${room}</span></div><div class="inline-block"><span class="text-slate-400 mr-2">지도교사</span><span class="font-bold">${proctor}</span></div></div></div><div class="flex justify-center my-8 print:my-4"><div class="border-2 border-blue-800 bg-blue-800 text-white rounded-lg p-3 w-56 text-center font-bold text-2xl print:text-xl print:p-2 print:rounded-none shadow-md print:shadow-none tracking-widest">교 탁</div></div><div class="grid grid-cols-5 gap-4 print:gap-2">${seats}</div></div>`;
            };
        });
    </script>
</body>
</html>
